<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Player</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #151a28;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    /* Responsive video container */
    .video-container {
      position: relative;
      width: 80vmin;
      max-height: 80vh;
      height: 80%;
      border-radius: 2vh;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }

    .video-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    /* Optional title */
    .title {
      position: absolute;
      top: 20px;
      left: 20px;
      color: white;
      font-size: 20px;
      font-weight: bold;
      z-index: 10;
    }
  </style>
</head>

<body>

  <div class="video-container">
    <iframe 
      src="https://www.youtube.com/embed/4a0T5Xzmvzs"
      title="YouTube video player"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen>
    </iframe>
  </div>

</body>
</html>
