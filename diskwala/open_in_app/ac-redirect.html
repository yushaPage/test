<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Open in Browser</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px;
      background: #f5f5f5;
    }
    .box {
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      display: inline-block;
    }
    h2 {
      margin-bottom: 10px;
    }
    p {
      color: #555;
      margin-bottom: 20px;
    }
    .btn {
      display: inline-block;
      padding: 12px 20px;
      font-size: 16px;
      color: white;
      background: #007bff;
      border-radius: 8px;
      text-decoration: none;
    }
    .btn:hover {
      background: #0056b3;
    }
  </style>
</head>

<body>
  <div class="box">
    <h2>Open in Browser</h2>
    <p>This link works better outside Instagram.</p>

    <!-- Intent link (Android) -->
    <a class="btn"
       href="intent://example.com#Intent;scheme=https;package=com.android.chrome;end">
       Open in Chrome
    </a>

    <br><br>

    <!-- Normal fallback -->
    <a href="https://example.com">Or tap here</a>
  </div>
</body>
</html>
